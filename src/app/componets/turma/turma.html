<h1 class="flex justify-center py-6">Pegando os dados de Turmas</h1>
<hr />
<table class="">
  <thead>
    <tr class="gap-4 bg-gray-800">
      <th class="text-start align-start justify-start">id</th>
      <th class="text-start align-start justify-start">nome</th>
      <th class="text-start align-start justify-start">descricao</th>
      <th class="text-start align-start justify-start">cursoId</th>
    </tr>
  </thead>
  <tbody>
    @for (turma of turma$ | async; track turma.id) {
      <tr class="border-t-2">
        <td>{{ turma.id }}</td>
        <td>{{ turma.nome }}</td>
        <td>{{ turma.descricao }}</td>
        <td>{{ turma.cursoId }}</td>
      </tr>
    }
  </tbody>
</table>
