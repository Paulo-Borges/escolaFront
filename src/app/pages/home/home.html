<main>
  <app-turma></app-turma>

  <hr />
  <h1 class="flex justify-center py-6">Pegando os dados de Cursos</h1>
  <hr />
  <table class="">
    <thead>
      <tr class="gap-4 bg-gray-800">
        <th class="text-start align-start justify-start">id</th>
        <th class="text-start align-start justify-start">nome</th>
        <th class="text-start align-start justify-start">descricao</th>
      </tr>
    </thead>
    <tbody>
      @for (curso of curso$ | async; track curso.id) {
        <tr class="border-t-2">
          <td>{{ curso.id }}</td>
          <td>{{ curso.nome }}</td>
          <td>{{ curso.descricao }}</td>
        </tr>
      }
    </tbody>
  </table>

  <app-matricula></app-matricula>
</main>
